<!-- favicon.svg — Small icon shown in browser tab. Blue "M" on black square. -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" role="img" aria-label="MAB">
  <rect width="32" height="32" rx="6" fill="#0a0a0f"/> <!-- Black rounded square background — CHANGE fill for different color -->
  <text x="16" y="22" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="700" fill="#1a5cff">M</text> <!-- Letter M in blue — CHANGE to your initial -->
</svg>
