<!DOCTYPE html> <!-- HTML5 document -->

  <link rel="stylesheet" href="styles.css?v=2"> <!-- Shared header, footer, hamburger, colors (cache-bust) -->
  <link rel="stylesheet" href="contact.css?v=2"> <!-- Contact form layout (cache-bust) -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css" rel="stylesheet">
  <title>Contact | Mohammed Amin Brimah</title>
</head>
<body>

  <header class="header">
    <a href="index.html" class="logo"><span>Mohammed Amin</span>&nbsp;Brimah</a>

    <button type="button" class="hamburger" id="hamburger" aria-label="Open navigation menu" aria-expanded="false">
      <span class="hamburger-bar"></span>
      <span class="hamburger-bar"></span>
      <span class="hamburger-bar"></span>
    </button>

    <nav class="navbar" id="navbar">
      <a href="index.html">Home</a>
      <a href="about.html">About</a>
      <a href="index.html#skills">Skills</a>
    </nav>

    <a href="contact.html" class="contact">Contact Me</a>
  </header>

  <section class="contact-form"> <!-- Contact form section -->
    <h2 class="contact-me">Contact <span>Me</span></h2> <!-- Section title -->
    <p class="contact-intro">Interested in working together? Fill out the form below—I typically respond within 24–48 hours.</p>

    <form action="#" method="post"> <!-- Form; action="#" until backend is added -->
      <div class="input-box"> <!-- Row of two inputs -->
        <input type="text" name="name" placeholder="Full Name" required> <!-- Name field -->
        <input type="email" name="email" placeholder="Email" required> <!-- Email field -->
      </div>
      <div class="input-box">
        <input type="tel" name="phone" placeholder="Phone Number"> <!-- Optional phone -->
        <input type="text" name="subject" placeholder="Subject"> <!-- Message subject -->
      </div>
      <textarea name="message" cols="30" rows="10" placeholder="Your Message" required></textarea> <!-- Message body -->
      <input type="submit" value="Send Message" class="btn-1"> <!-- Submit button -->
    </form>
  </section>

  <footer class="footer">
    <div class="social">
      <a href="#" aria-label="Facebook"><i class="bx bxl-facebook-circle"></i></a>
      <a href="#" aria-label="LinkedIn"><i class="bx bxl-linkedin-square"></i></a>
      <a href="#" aria-label="Twitter"><i class="bx bxl-twitter"></i></a>
      <a href="#" aria-label="Instagram"><i class="bx bxl-instagram-alt"></i></a>
    </div>
